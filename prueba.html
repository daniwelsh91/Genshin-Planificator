<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Genshin Tracker - SANDBOX 2026</title>

    <meta name="theme-color" content="#0b0f1a">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b0f1a;
            color: #f1f5f9;
            background-image: url('fondo.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }
        
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at 50% 0%, #1a2235 0%, #0b0f1a 80%);
            z-index: -2;
        }

        .glass-effect {
            background: rgba(15, 23, 42, 0.5);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        .card-hover {
            transition: all 0.3s ease;
        }
        .card-hover:hover {
            transform: translateY(-4px);
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(96, 165, 250, 0.4);
            box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.3);
        }

        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .leak-tag {
            background: linear-gradient(90deg, #3b82f6 0%, #8b5cf6 100%);
            color: white;
            font-size: 0.65rem;
            font-weight: 800;
            padding: 2px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .tele-quick-btn.active {
            background-color: rgba(42, 171, 238, 0.25);
            border-color: rgba(42, 171, 238, 0.6);
            color: #fff;
            box-shadow: 0 0 15px rgba(42, 171, 238, 0.2);
        }

        .status-badge {
            background: rgba(16, 185, 129, 0.2);
            color: #10b981;
            padding: 2px 8px;
            border-radius: 99px;
            font-size: 10px;
            font-weight: bold;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 8px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 8px; }
    </style>
</head>
<body class="min-h-screen flex flex-col relative text-gray-100 overflow-x-hidden">

    <div class="fixed top-[-10%] left-[-10%] w-[40vw] h-[40vw] rounded-full bg-blue-600/10 blur-[120px] z-[-1] pointer-events-none"></div>

    <header class="w-full pt-8 pb-4 relative z-20">
        <div class="container mx-auto px-4 flex flex-col items-center">
            <h1 class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-300 via-purple-300 to-indigo-300 tracking-tight text-center drop-shadow-lg mb-2">
                Genshin Tracker <span class="text-xs align-top text-blue-400 font-bold ml-2 bg-red-900/30 px-2 py-1 rounded-md border border-red-500/30">SANDBOX 2026</span>
            </h1>
            
            <div id="versionStatus" class="flex items-center gap-2 mb-4 animate-pulse">
                <span class="status-badge">Sincronizando feeds...</span>
            </div>
            
            <div class="flex flex-wrap justify-center gap-2 bg-black/40 p-1.5 rounded-2xl backdrop-blur-md border border-white/10 shadow-xl">
                <button id="btnTabLeaks" onclick="switchTab('leaks')" class="px-4 md:px-6 py-2 rounded-xl font-bold transition-all duration-300 bg-white/15 text-white shadow-lg border border-white/10 text-xs md:text-sm">Reddit</button>
                <button id="btnTabTelegram" onclick="switchTab('telegram')" class="px-4 md:px-6 py-2 rounded-xl font-bold transition-all duration-300 text-gray-400 hover:text-white hover:bg-white/5 text-xs md:text-sm border border-transparent">Telegram</button>
            </div>
        </div>
    </header>

    <main class="flex-grow container mx-auto px-4 py-4 relative z-10 flex flex-col items-center pb-24">
        
        <!-- Pestaña Reddit -->
        <div id="leaksTab" class="hidden w-full max-w-6xl flex flex-col items-center animate-fade-in">
            <div class="w-full flex justify-between items-end mb-8 px-2">
                <h2 class="text-2xl font-black text-blue-400 flex items-center gap-2">Reddit Feed (Snezhnaya)</h2>
                <button onclick="loadCustomLeaks()" class="bg-blue-600/20 text-blue-300 border border-blue-500/50 px-4 py-2 rounded-xl text-xs font-bold transition">Actualizar</button>
            </div>
            <div id="leaksGrid" class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <!-- Pestaña Telegram -->
        <div id="telegramTab" class="hidden w-full max-w-6xl flex flex-col items-center animate-fade-in">
            <div class="w-full mb-6 px-2 flex justify-between items-center">
                <h2 class="text-2xl font-black text-[#2AABEE]">Telegram Live</h2>
                <div class="flex gap-2">
                    <button onclick="quickSwitchTelegram('team_mew')" class="tele-quick-btn active px-3 py-1.5 rounded-lg text-xs font-bold border border-white/10" data-channel="team_mew">@team_mew</button>
                    <button onclick="quickSwitchTelegram('hiragara_leaks')" class="tele-quick-btn px-3 py-1.5 rounded-lg text-xs font-bold border border-white/10" data-channel="hiragara_leaks">@hiragara_leaks</button>
                </div>
            </div>
            <div id="telegramGrid" class="w-full grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

    </main>

    <!-- Modal Unificado -->
    <div id="postModal" class="fixed inset-0 z-[100] hidden opacity-0 transition-opacity duration-300 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="closePostModal()"></div>
        <div id="postModalContent" class="relative w-full max-w-3xl max-h-[90vh] glass-effect border border-white/20 rounded-3xl overflow-hidden transition-transform duration-300 scale-95 flex flex-col">
            <div class="p-6 border-b border-white/10 flex justify-between items-start">
                <h3 id="modalTitle" class="font-bold text-white text-lg">Cargando...</h3>
                <button onclick="closePostModal()" class="text-gray-400 p-2 hover:bg-white/10 rounded-lg">✕</button>
            </div>
            <div id="modalBody" class="p-6 overflow-y-auto custom-scrollbar flex-1"></div>
        </div>
    </div>

    <script>
        // Sincronización de Versión 2026
        function updateGameStatus() {
            const now = new Date();
            const currentVersion = "6.3"; 
            document.getElementById('versionStatus').innerHTML = `
                <span class="status-badge">● Hoy: ${now.toLocaleDateString()}</span>
                <span class="status-badge">● Versión Actual: ${currentVersion}</span>
            `;
        }

        function switchTab(tabId) {
            const tabs = ['leaks', 'telegram'];
            tabs.forEach(id => {
                const el = document.getElementById(id + 'Tab');
                const btn = document.getElementById('btnTab' + id.charAt(0).toUpperCase() + id.slice(1));
                if(el) el.classList.toggle('hidden', id !== tabId);
                if(btn) btn.className = id === tabId ? 
                    "px-4 md:px-6 py-2 rounded-xl font-bold transition-all duration-300 bg-white/15 text-white shadow-lg border border-white/10 text-xs md:text-sm" : 
                    "px-4 md:px-6 py-2 rounded-xl font-bold transition-all duration-300 text-gray-400 hover:text-white hover:bg-white/5 text-xs md:text-sm border border-transparent";
            });
        }

        async function loadCustomLeaks() {
            const grid = document.getElementById('leaksGrid');
            grid.innerHTML = Array(6).fill(`<div class="glass-effect rounded-2xl p-5 animate-pulse h-40"></div>`).join('');
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://www.reddit.com/r/Genshin_Impact_Leaks/new.json?limit=15')}&_=${Date.now()}`);
                const data = await res.json();
                const json = JSON.parse(data.contents);
                grid.innerHTML = '';
                window.loadedRedditPosts = json.data.children;
                window.loadedRedditPosts.forEach((post, index) => {
                    const d = post.data;
                    const card = document.createElement('div');
                    card.className = "glass-effect rounded-2xl p-5 card-hover cursor-pointer";
                    card.onclick = () => openModal('reddit', index);
                    card.innerHTML = `<h3 class="text-xs font-bold text-white line-clamp-2">${d.title}</h3><div class="text-[10px] text-gray-500 mt-2">u/${d.author}</div>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = `<p class="col-span-full text-center text-red-400">Error Reddit.</p>`; }
        }

        async function loadTelegramFeed() {
            const channel = document.getElementById('telegramInput')?.value || "team_mew";
            const grid = document.getElementById('telegramGrid');
            grid.innerHTML = Array(3).fill(`<div class="glass-effect rounded-2xl p-5 animate-pulse h-60"></div>`).join('');
            try {
                const res = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent('https://t.me/s/'+channel)}&_=${Date.now()}`);
                const data = await res.json();
                const doc = new DOMParser().parseFromString(data.contents, 'text/html');
                const messages = Array.from(doc.querySelectorAll('.tgme_widget_message')).reverse();
                grid.innerHTML = '';
                window.loadedTelegramPosts = [];
                messages.slice(0, 15).forEach((msg, index) => {
                    const text = msg.querySelector('.tgme_widget_message_text')?.innerText || 'Media Post';
                    window.loadedTelegramPosts.push({ text, author: channel });
                    const card = document.createElement('div');
                    card.className = "glass-effect rounded-2xl p-5 card-hover cursor-pointer border-t border-[#2AABEE]/20";
                    card.onclick = () => openModal('telegram', index);
                    card.innerHTML = `<div class="text-[10px] text-[#2AABEE] font-bold mb-2">@${channel}</div><p class="text-xs line-clamp-4 text-gray-300">${text}</p>`;
                    grid.appendChild(card);
                });
            } catch (e) { grid.innerHTML = `<p class="col-span-full text-center text-red-400">Error Telegram.</p>`; }
        }

        function quickSwitchTelegram(channel) {
            const input = document.getElementById('telegramInput');
            if(input) input.value = channel;
            document.querySelectorAll('.tele-quick-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-channel') === channel));
            loadTelegramFeed();
        }

        function openModal(type, index) {
            const body = document.getElementById('modalBody');
            const title = document.getElementById('modalTitle');
            if (type === 'reddit') {
                const post = window.loadedRedditPosts[index].data;
                title.textContent = "Reddit Leak";
                body.innerHTML = `<p class="text-sm font-bold text-white mb-4">${post.title}</p><div class="text-xs text-gray-300 leading-relaxed">${post.selftext || 'Consulta el hilo original para ver las tablas de escalado.'}</div>`;
            } else {
                const post = window.loadedTelegramPosts[index];
                title.textContent = "Telegram Message";
                body.innerHTML = `<div class="text-sm text-gray-200 leading-relaxed">${post.text}</div>`;
            }
            document.getElementById('postModal').classList.remove('hidden');
            setTimeout(() => document.getElementById('postModal').classList.remove('opacity-0'), 10);
        }

        function closePostModal() {
            document.getElementById('postModal').classList.add('opacity-0');
            setTimeout(() => document.getElementById('postModal').classList.add('hidden'), 300);
        }

        window.addEventListener('DOMContentLoaded', () => {
            updateGameStatus();
            switchTab('leaks');
            loadCustomLeaks();
            loadTelegramFeed();
        });
    </script>
    <input type="hidden" id="telegramInput" value="team_mew">
</body>
</html>
